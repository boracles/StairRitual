            if (!last || bin.bin - last.bin <= 1) {
              segment.push(bin);
            } else {
              flushSegment();
              segment = [bin];
            }
          });
          flushSegment();
        });

        return events.sort((a, b) => a.time - b.time);
      }

      function classifyScorePixel(h, s, v) {
        // Hue ranges match the current score color system.
        // Dark/black pixels are intentionally ignored before this function.
        if (h >= 238 && h <= 272) return "head";
        if (h >= 188 && h <= 208) return "shoulder";
        if (h >= 112 && h <= 145) return "elbow";
        if (h >= 49 && h <= 65 && s > 0.42) return "hand";
        if ((h >= 342 && h <= 360) || h <= 8) return "hip";
        if (h >= 20 && h <= 38) return "knee";
        if (h >= 312 && h <= 335) return "foot";
        return null;
      }

      function getImageScoreDensityThreshold(category, scale) {
        const base =
          {
            head: 5,
            shoulder: 7,
            elbow: 7,
            hand: 6,
            hip: 6,
            knee: 6,
            foot: 6,
          }[category] || 6;
        return Math.max(3, Math.round(base * scale));
      }

      function rgbToHsv(r, g, b) {
        r /= 255;
        g /= 255;
        b /= 255;
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        const d = max - min;
        let h = 0;

        if (d !== 0) {
          if (max === r) h = ((g - b) / d) % 6;
          else if (max === g) h = (b - r) / d + 2;
          else h = (r - g) / d + 4;
          h *= 60;
          if (h < 0) h += 360;
        }

        return {
          h,
          s: max === 0 ? 0 : d / max,
          v: max,
        };
      }

      async function playLoadedImageScore() {
        if (
          loadedImageScoreEvents.length === 0 ||
          imageScorePlaying ||
          sequenceRunning
        )
          return;

        if (!audioReady) {
          await startAudio();
        }

        // 이미지 스코어 재생은 듣기 전용 모드다.
        // live pose/movement sound와 절대 섞이지 않게 초기화한다.
        activeScoreMode = "image";
        sequenceRunning = false;
        bodyGlyphEvents.length = 0;
        personTracks.length = 0;
        smoothedSoundEnergy = 0;
        resetContinuousSoundForImageScore();

        imageScorePlaying = true;
        updateSequenceControls();
        sequenceStatus.textContent = "PLAYING IMAGE SCORE";

        const duration = clamp(
          Number(imageScoreDurationInput.value) || 30,
          5,
          180,
        );

        loadedImageScoreEvents.forEach((event) => {
          const timer = window.setTimeout(() => {
            playImageScoreEvent(event);
          }, event.time * 1000);
          imageScoreTimers.push(timer);
        });

        const doneTimer = window.setTimeout(
          () => {
            imageScorePlaying = false;
            imageScoreTimers.length = 0;
            fadeContinuousSoundToIdle();
            sequenceStatus.textContent = "IMAGE SCORE DONE";
            updateSequenceControls();
          },
          duration * 1000 + 300,
        );
        imageScoreTimers.push(doneTimer);
      }

      function stopLoadedImageScore() {
        imageScoreTimers.forEach((timer) => window.clearTimeout(timer));
        imageScoreTimers.length = 0;
        imageScorePlaying = false;
        fadeContinuousSoundToIdle();
        sequenceStatus.textContent = "IMAGE SCORE STOPPED";
        updateSequenceControls();
      }

      function startContinuousSoundForMovement() {
        if (!audioReady) return;
        droneGain.gain.cancelScheduledValues(Tone.now());
        breathGain.gain.cancelScheduledValues(Tone.now());
        shimmerGain.gain.cancelScheduledValues(Tone.now());
        airGain.gain.cancelScheduledValues(Tone.now());
        squealGain.gain.cancelScheduledValues(Tone.now());
        ringGain.gain.cancelScheduledValues(Tone.now());

        droneGain.gain.rampTo(0.018, 0.22);
        breathGain.gain.rampTo(0.004, 0.22);
        shimmerGain.gain.rampTo(0.006, 0.3);
        airGain.gain.rampTo(0.006, 0.3);
        squealGain.gain.rampTo(0.001, 0.3);
        ringGain.gain.rampTo(0.001, 0.3);
        filter.frequency.rampTo(720, 0.25);
        delay.feedback.rampTo(0.22, 0.25);
        delay.wet.rampTo(0.16, 0.25);
        reverb.wet.rampTo(0.68, 0.25);
      }

      function resetContinuousSoundForImageScore() {
        if (!audioReady) return;
        fadeContinuousSoundToSilence(0.12);
        filter.frequency.rampTo(900, 0.12);
        delay.feedback.rampTo(0.22, 0.12);
        delay.wet.rampTo(0.16, 0.12);
        reverb.wet.rampTo(0.68, 0.12);
      }

      function fadeContinuousSoundToIdle() {
        fadeContinuousSoundToSilence();
      }

      function fadeContinuousSoundToSilence(time = 0.35) {
        if (!audioReady) return;
        droneGain.gain.rampTo(0, time);
        breathGain.gain.rampTo(0, time);
        shimmerGain.gain.rampTo(0, time);
        airGain.gain.rampTo(0, time);
        squealGain.gain.rampTo(0, time);
        ringGain.gain.rampTo(0, time);
        delay.feedback.rampTo(0.18, time);
        delay.wet.rampTo(0.12, time);
      }

      function playImageScoreEvent(event) {
        if (!audioReady) return;

        const now = Tone.now();
        const e = clamp(event.energy || 0.3, 0.08, 1);
        const x = clamp(event.x ?? 0.5, 0, 1);
        const y = clamp(event.y ?? 0.5, 0, 1);
        const velocity = clamp(0.16 + e * 0.68, 0.12, 0.92);

        if (event.category === "head") {
          const note = pickNote(["C5", "Eb5", "G5", "Bb5", "C6"], x);
          signalSynth.triggerAttackRelease(note, "4n", now, velocity * 0.52);
          squealGain.gain.rampTo(0.004 + e * 0.034, 0.35);
          squealOsc.frequency.rampTo(420 + y * 620 + e * 180, 0.5);
        } else if (event.category === "shoulder") {
          const note = pickNote(scales.shoulder, y);
          signalSynth.triggerAttackRelease(note, "2n", now, velocity * 0.38);
          droneGain.gain.rampTo(0.026 + e * 0.11, 0.6);
          reverb.wet.rampTo(0.68 + e * 0.18, 0.8);
        } else if (event.category === "elbow") {
          const note = pickNote(["G2", "Bb2", "C3", "Eb3"], x);
          metalSynth.triggerAttackRelease(note, "8n", now, velocity * 0.22);
          filter.frequency.rampTo(540 + e * 1500, 0.45);
        } else if (event.category === "hand") {
          const note = pickNote(scales.hand, x);
          signalSynth.triggerAttackRelease(note, "8n", now, velocity * 0.82);
          ringGain.gain.rampTo(0.003 + e * 0.028, 0.4);
          ringOsc.frequency.rampTo(520 + x * 740 + e * 180, 0.45);
        } else if (event.category === "hip") {
          const note = pickNote(scales.hip, y);
          bodySynth.triggerAttackRelease(note, "1n", now, velocity * 0.54);
          droneGain.gain.rampTo(0.03 + e * 0.12, 0.6);
        } else if (event.category === "knee") {
          const note = pickNote(scales.knee, y);
          bodySynth.triggerAttackRelease(note, "4n", now, velocity * 0.58);
          delay.feedback.rampTo(0.24 + e * 0.16, 0.5);
        } else if (event.category === "foot") {
          const note = pickNote(scales.foot, x);
          bodySynth.triggerAttackRelease(note, "2n", now, velocity * 0.62);
          airGain.gain.rampTo(0.012 + e * 0.046, 0.55);
        }

        filter.frequency.rampTo(720 + e * 1400 + (1 - y) * 480, 0.7);
        shimmerGain.gain.rampTo(0.012 + e * 0.05, 0.75);
        airGain.gain.rampTo(0.01 + e * 0.035, 0.8);
      }

      async function saveLongScoreImage() {
        if (sequenceRunning || archivedBodyGlyphEvents.length === 0) return;

        const duration = Math.max(
          lastSequenceDuration,
          archivedBodyGlyphEvents[archivedBodyGlyphEvents.length - 1]?.time ||
            0,
          1,
        );

        const exportWidth = 1600;
        let pxPerSecond = 180;
        let headerH = 220;
        let footerH = 170;
        let exportHeight = Math.round(
          headerH + duration * pxPerSecond + footerH,
        );
        const maxHeight = 14000;
        if (exportHeight > maxHeight) {
          pxPerSecond = Math.max(
            70,
            (maxHeight - headerH - footerH) / duration,
          );
          exportHeight = Math.round(headerH + duration * pxPerSecond + footerH);
        }

        const exportCanvas = document.createElement("canvas");
        exportCanvas.width = exportWidth;
        exportCanvas.height = exportHeight;
        const rctx = exportCanvas.getContext("2d");

        const scoreRect = {
          left: 88,
          top: headerH,
          width: exportWidth - 176,
          height: exportHeight - headerH - footerH,
        };
        scoreRect.right = scoreRect.left + scoreRect.width;
        scoreRect.bottom = scoreRect.top + scoreRect.height;

        const clampLocal = (v, a, b) => Math.max(a, Math.min(b, v));
        const hexToRgbLocal = (hex) => {
          const normalized = hex.replace("#", "");
          const bigint = parseInt(normalized, 16);
          return {
            r: (bigint >> 16) & 255,
            g: (bigint >> 8) & 255,
            b: bigint & 255,
          };
        };

        const beginSoftFill = (
          drawShape,
          colorHex,
          alpha,
          level,
          glowSize = 20,
        ) => {
          const c = hexToRgbLocal(colorHex);
          const coreAlpha = Math.min(1, 0.28 + alpha * 1.15);

          rctx.save();
          rctx.filter = `blur(${5 + level * 3}px)`;
          rctx.shadowColor = `rgba(${c.r},${c.g},${c.b},${0.18 + level * 0.14})`;
          rctx.shadowBlur = 14 + level * 12;
          const grad = rctx.createRadialGradient(
            0,
            0,
            0,
            0,
            0,
            glowSize * 1.75,
          );
          grad.addColorStop(
            0,
            `rgba(${c.r},${c.g},${c.b},${Math.min(1, 0.98 * alpha)})`,
          );
          grad.addColorStop(
            0.36,
            `rgba(${c.r},${c.g},${c.b},${Math.min(1, 0.96 * alpha)})`,
          );
          grad.addColorStop(
            0.66,
            `rgba(${c.r},${c.g},${c.b},${(0.42 + level * 0.1) * alpha})`,
          );
          grad.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
          rctx.fillStyle = grad;
          rctx.beginPath();
          drawShape(1.03);
          rctx.fill();
          rctx.restore();

          rctx.save();
          rctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${coreAlpha})`;
          rctx.beginPath();
          drawShape(0.98);
          rctx.fill();
          rctx.restore();
        };

        const drawHead = (size, colorHex, alpha, level) => {
          const c = hexToRgbLocal(colorHex);
          const rayCount = 18;
          const innerR = size * 0.42;
          const outerR = size * 0.92;
          const rayW = size * 0.11;
          const coreAlpha = Math.min(1, 0.16 + alpha * 1.28);
          rctx.save();
          rctx.filter = `blur(${5 + level * 3}px)`;
          rctx.lineCap = "round";
          rctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},${Math.min(1, alpha * 0.52)})`;
          rctx.lineWidth = rayW * 1.4;
          for (let i = 0; i < rayCount; i++) {
            const a = (Math.PI * 2 * i) / rayCount - Math.PI / 2;
            rctx.beginPath();
            rctx.moveTo(Math.cos(a) * innerR, Math.sin(a) * innerR);
            rctx.lineTo(Math.cos(a) * outerR, Math.sin(a) * outerR);
            rctx.stroke();
          }
          rctx.restore();
          rctx.save();
          rctx.lineCap = "round";
          rctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},${coreAlpha})`;
          rctx.lineWidth = rayW;
          for (let i = 0; i < rayCount; i++) {
            const a = (Math.PI * 2 * i) / rayCount - Math.PI / 2;
            rctx.beginPath();
            rctx.moveTo(Math.cos(a) * innerR, Math.sin(a) * innerR);
            rctx.lineTo(Math.cos(a) * outerR, Math.sin(a) * outerR);
            rctx.stroke();
          }
          rctx.restore();
          beginSoftFill(
            (m = 1) => {
              rctx.arc(0, 0, size * 0.42 * m, 0, Math.PI * 2);
            },
            colorHex,
            alpha,
            level,
            size * 0.9,
          );
        };

        const drawArch = (size, colorHex, alpha, level) =>
          beginSoftFill(
            (m = 1) => {
              rctx.moveTo(-size * m, size * 0.28 * m);
              rctx.quadraticCurveTo(
                0,
                -size * 0.8 * m,
                size * m,
                size * 0.28 * m,
              );
              rctx.lineTo(size * 0.55 * m, size * 0.28 * m);
              rctx.quadraticCurveTo(
                0,
                -size * 0.35 * m,
                -size * 0.55 * m,
                size * 0.28 * m,
              );
              rctx.closePath();
            },
            colorHex,
            alpha,
            level,
            size * 1.35,
          );

        const drawElbow = (size, colorHex, alpha, level) =>
          beginSoftFill(
            (m = 1) => {
              const w = size * 1.08 * m;
              const h = size * 0.72 * m;
              rctx.moveTo(-w * 0.98, -h * 0.14);
              rctx.bezierCurveTo(
                -w * 0.72,
                -h * 1.0,
                w * 0.24,
                -h * 1.08,
                w * 0.82,
                -h * 0.38,
              );
              rctx.bezierCurveTo(
                w * 1.12,
                h * 0.02,
                w * 0.92,
                h * 0.72,
                w * 0.18,
                h * 0.86,
              );
              rctx.bezierCurveTo(
                -w * 0.54,
                h * 1.0,
                -w * 1.08,
                h * 0.44,
                -w * 0.98,
                -h * 0.14,
              );
              rctx.closePath();
            },
            colorHex,
            alpha,
            level,
            size * 1.6,
          );

        const drawDisc = (size, colorHex, alpha, level) =>
          beginSoftFill(
            (m = 1) => {
              rctx.arc(0, 0, size * 0.98 * m, 0, Math.PI * 2);
            },
            colorHex,
            alpha,
            level,
            size * 1.5,
          );

        const drawTwin = (size, colorHex, alpha, level) => {
          const r = size * 0.74;
          const offset = size * 0.54;
          beginSoftFill(
            (m = 1) => {
              rctx.arc(-offset * m, 0, r * m, 0, Math.PI * 2);
              rctx.arc(offset * m, 0, r * m, 0, Math.PI * 2);
            },
            colorHex,
            alpha,
            level,
            size * 1.55,
          );
        };

        const drawDome = (size, colorHex, alpha, level) =>
          beginSoftFill(
            (m = 1) => {
              const w = size * 1.16 * m;
              const h = size * 0.92 * m;
              rctx.moveTo(-w, h * 0.34);
              rctx.bezierCurveTo(
                -w * 0.92,
                -h * 0.28,
                -w * 0.42,
                -h * 0.92,
                0,
                -h * 0.92,
              );
              rctx.bezierCurveTo(
                w * 0.42,
                -h * 0.92,
                w * 0.92,
                -h * 0.28,
                w,
                h * 0.34,
              );
              rctx.lineTo(-w, h * 0.34);
              rctx.closePath();
            },
            colorHex,
            alpha,
            level,
            size * 1.56,
          );

        const drawPoint = (size, colorHex, alpha, level) =>
          beginSoftFill(
            (m = 1) => {
              const w = size * 0.98 * m;
              const h = size * 1.08 * m;
              rctx.moveTo(0, -h * 1.02);
              rctx.bezierCurveTo(
                w * 0.62,
                -h * 0.7,
                w * 0.98,
                -h * 0.02,
                w * 0.72,
                h * 0.62,
              );
              rctx.quadraticCurveTo(w * 0.34, h * 0.98, 0, h * 0.96);
              rctx.quadraticCurveTo(-w * 0.34, h * 0.98, -w * 0.72, h * 0.62);
              rctx.bezierCurveTo(
                -w * 0.98,
                -h * 0.02,
                -w * 0.62,
                -h * 0.7,
                0,
                -h * 1.02,
              );
              rctx.closePath();
            },
            colorHex,
            alpha,
            level,
            size * 1.6,
          );

        const drawGlyphLocal = (glyph, x, y, scale, alpha, blurPx = 0) => {
          const p = glyph.parts;
          const unit = 76 * scale;
          const pos = {
            head: { x: 0, y: -unit * 2.35 },
            shoulderL: { x: -unit * 0.95, y: -unit * 1.45 },
            shoulderR: { x: unit * 0.95, y: -unit * 1.45 },
            elbowL: { x: -unit * 1.5, y: -unit * 0.18 },
            elbowR: { x: unit * 1.5, y: -unit * 0.18 },
            handL: { x: -unit * 2.05, y: -unit * 0.65 },
            handR: { x: unit * 2.05, y: -unit * 0.65 },
            hip: { x: 0, y: 0 },
            kneeL: { x: -unit * 0.66, y: unit * 1.15 },
            kneeR: { x: unit * 0.66, y: unit * 1.15 },
            footL: { x: -unit * 0.98, y: unit * 2.15 },
            footR: { x: unit * 0.98, y: unit * 2.15 },
          };

          rctx.save();
          rctx.translate(x, y);
          rctx.globalAlpha = alpha;
          rctx.filter = `blur(${blurPx}px)`;

          if (p.head.active) {
            rctx.save();
            rctx.translate(pos.head.x, pos.head.y);
            drawHead(
              unit * 0.135 * (0.8 + p.head.level * 0.62),
              DESIGN.colors.head,
              alpha,
              p.head.level,
            );
            rctx.restore();
          }
          if (p.shoulderL.active) {
            rctx.save();
            rctx.translate(pos.shoulderL.x, pos.shoulderL.y);
            drawArch(
              unit * 0.2 * (0.82 + p.shoulderL.level * 0.72),
              DESIGN.colors.shoulder,
              alpha,
              p.shoulderL.level,
            );
            rctx.restore();
          }
          if (p.shoulderR.active) {
            rctx.save();
            rctx.translate(pos.shoulderR.x, pos.shoulderR.y);
            drawArch(
              unit * 0.2 * (0.82 + p.shoulderR.level * 0.72),
              DESIGN.colors.shoulder,
              alpha,
              p.shoulderR.level,
            );
            rctx.restore();
          }
          if (p.elbowL.active) {
            rctx.save();
            rctx.translate(pos.elbowL.x, pos.elbowL.y);
            drawElbow(
              unit * 0.22 * (0.84 + p.elbowL.level * 0.85),
              DESIGN.colors.elbow,
              alpha,
              p.elbowL.level,
            );
            rctx.restore();
          }
          if (p.elbowR.active) {
            rctx.save();
            rctx.translate(pos.elbowR.x, pos.elbowR.y);
            drawElbow(
              unit * 0.22 * (0.84 + p.elbowR.level * 0.85),
              DESIGN.colors.elbow,
              alpha,
              p.elbowR.level,
            );
            rctx.restore();
          }
          if (p.handL.active) {
            rctx.save();
            rctx.translate(pos.handL.x, pos.handL.y);
            drawDisc(
              unit * 0.18 * (0.8 + p.handL.level * 0.78),
              DESIGN.colors.hand,
              alpha,
              p.handL.level,
            );
            rctx.restore();
          }
          if (p.handR.active) {
            rctx.save();
            rctx.translate(pos.handR.x, pos.handR.y);
            drawDisc(
              unit * 0.18 * (0.8 + p.handR.level * 0.78),
              DESIGN.colors.hand,
              alpha,
              p.handR.level,
            );
            rctx.restore();
          }
          if (p.hip.active) {
            rctx.save();
            rctx.translate(pos.hip.x, pos.hip.y);
            drawTwin(
              unit * 0.21 * (0.82 + p.hip.level * 0.72),
              DESIGN.colors.hip,
              alpha,
              p.hip.level,
            );
            rctx.restore();
          }
          if (p.kneeL.active) {
            rctx.save();
            rctx.translate(pos.kneeL.x, pos.kneeL.y);
            drawDome(
              unit * 0.18 * (0.82 + p.kneeL.level * 0.75),
              DESIGN.colors.knee,
              alpha,
              p.kneeL.level,
            );
            rctx.restore();
          }
          if (p.kneeR.active) {
            rctx.save();
            rctx.translate(pos.kneeR.x, pos.kneeR.y);
            drawDome(
              unit * 0.18 * (0.82 + p.kneeR.level * 0.75),
              DESIGN.colors.knee,
              alpha,
              p.kneeR.level,
            );
            rctx.restore();
          }
          if (p.footL.active) {
            rctx.save();
            rctx.translate(pos.footL.x, pos.footL.y);
            drawPoint(
              unit * 0.18 * (0.82 + p.footL.level * 0.78),
              DESIGN.colors.foot,
              alpha,
              p.footL.level,
            );
            rctx.restore();
          }
          if (p.footR.active) {
            rctx.save();
            rctx.translate(pos.footR.x, pos.footR.y);
            drawPoint(
              unit * 0.18 * (0.82 + p.footR.level * 0.78),
              DESIGN.colors.foot,
              alpha,
              p.footR.level,
            );
            rctx.restore();
          }
          rctx.restore();
        };

        const getLayers = (glyph) => [
          {
            id: "head",
            level: glyph.parts.head.level,
            color: DESIGN.colors.head,
          },
          {
            id: "shoulder",
            level:
              (glyph.parts.shoulderL.level + glyph.parts.shoulderR.level) * 0.5,
            color: DESIGN.colors.shoulder,
          },
          {
            id: "elbow",
            level: (glyph.parts.elbowL.level + glyph.parts.elbowR.level) * 0.5,
            color: DESIGN.colors.elbow,
          },
          {
            id: "hand",
            level: (glyph.parts.handL.level + glyph.parts.handR.level) * 0.5,
            color: DESIGN.colors.hand,
          },
          { id: "hip", level: glyph.parts.hip.level, color: DESIGN.colors.hip },
          {
            id: "knee",
            level: (glyph.parts.kneeL.level + glyph.parts.kneeR.level) * 0.5,
            color: DESIGN.colors.knee,
          },
          {
            id: "foot",
            level: (glyph.parts.footL.level + glyph.parts.footR.level) * 0.5,
            color: DESIGN.colors.foot,
          },
        ];

        const drawStamp = (x, y, radius, colorHex, alpha) => {
          const c = hexToRgbLocal(colorHex);
          const grad = rctx.createRadialGradient(x, y, 0, x, y, radius * 1.7);
          grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${alpha})`);
          grad.addColorStop(0.48, `rgba(${c.r},${c.g},${c.b},${alpha * 0.62})`);
          grad.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
          rctx.fillStyle = grad;
          rctx.beginPath();
          rctx.arc(x, y, radius * 1.7, 0, Math.PI * 2);
          rctx.fill();
        };

        const pointOnQuad = (t, p0, p1, p2) => {
          const mt = 1 - t;
          return {
            x: mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x,
            y: mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y,
          };
        };

        const positioned = archivedBodyGlyphEvents
          .map((glyph) => {
            const x =
              scoreRect.left +
              scoreRect.width * (0.14 + glyph.bodyX * 0.72) +
              (glyph.motionDriftX || 0) * 24;
            const y =
              scoreRect.top + (glyph.time / duration) * scoreRect.height;
            return { glyph, x, y };
          })
          .sort(
            (a, b) =>
              a.glyph.personId - b.glyph.personId ||
              a.glyph.time - b.glyph.time,
          );

        rctx.fillStyle = "#ffffff";
        rctx.fillRect(0, 0, exportWidth, exportHeight);

        const topGrad = rctx.createLinearGradient(0, 0, 0, headerH + 80);
        topGrad.addColorStop(0, "rgba(255,255,255,1)");
        topGrad.addColorStop(0.42, "rgba(255,255,255,0.98)");
        topGrad.addColorStop(0.82, "rgba(255,255,255,0.42)");
        topGrad.addColorStop(1, "rgba(255,255,255,0)");
        rctx.fillStyle = topGrad;
        rctx.fillRect(0, 0, exportWidth, headerH + 80);

        rctx.font =
          '600 42px Pretendard, "Noto Sans KR", "Noto Sans", Arial, sans-serif';
        rctx.fillStyle = "rgba(18,18,18,0.9)";
        rctx.textAlign = "center";
        rctx.textBaseline = "top";
        rctx.fillText("Ritual on the Stairs", exportWidth * 0.5, 56);

        rctx.font =
          '500 18px Pretendard, "Noto Sans KR", "Noto Sans", Arial, sans-serif';
        rctx.fillStyle = "rgba(18,18,18,0.44)";
        rctx.fillText(`${duration.toFixed(1)} sec`, exportWidth * 0.5, 108);

        // guide lines
        rctx.strokeStyle = "rgba(16,17,20,0.035)";
        rctx.lineWidth = 1;
        for (let y = scoreRect.top; y <= scoreRect.bottom; y += 28) {
          rctx.beginPath();
          rctx.moveTo(scoreRect.left, y);
          rctx.lineTo(scoreRect.right, y);
          rctx.stroke();
        }

        // trajectories
        const byPerson = new Map();
        positioned.forEach((item) => {
          if (!byPerson.has(item.glyph.personId))
            byPerson.set(item.glyph.personId, []);
          byPerson.get(item.glyph.personId).push(item);
        });

        byPerson.forEach((items) => {
          if (items.length < 2) return;
          for (let i = 1; i < items.length; i++) {
            const prev = items[i - 1];
            const curr = items[i];
            const energy = (prev.glyph.energy + curr.glyph.energy) * 0.5;
            const alpha = clampLocal(0.18 + energy * 0.28, 0.18, 0.58);
            const control = {
              x:
                (prev.x + curr.x) * 0.5 +
                ((prev.glyph.motionVecX || 0) + (curr.glyph.motionVecX || 0)) *
                  10,
              y:
                (prev.y + curr.y) * 0.5 +
                ((prev.glyph.motionVecY || 0) + (curr.glyph.motionVecY || 0)) *
                  10,
            };
            const steps = Math.max(
              12,
              Math.ceil(Math.hypot(curr.x - prev.x, curr.y - prev.y) / 18),
            );
            const layerMap = new Map();
            getLayers(prev.glyph).forEach((layer) =>
              layerMap.set(layer.id, {
                ...layer,
                prevLevel: layer.level,
                currLevel: 0,
              }),
            );
            getLayers(curr.glyph).forEach((layer) => {
              if (!layerMap.has(layer.id))
                layerMap.set(layer.id, {
                  ...layer,
                  prevLevel: 0,
                  currLevel: layer.level,
                });
              else layerMap.get(layer.id).currLevel = layer.level;
            });
            const activeLayers = [...layerMap.values()]
              .map((layer) => ({
                ...layer,
                avgLevel: (layer.prevLevel + layer.currLevel) * 0.5,
              }))
              .filter((layer) => layer.avgLevel > 0.08)
              .sort((a, b) => b.avgLevel - a.avgLevel)
              .slice(0, 3);
            for (let s = 0; s <= steps; s++) {
              const t = s / steps;
              const p = pointOnQuad(t, { x: prev.x, y: prev.y }, control, {
                x: curr.x,
                y: curr.y,
              });
              const baseR = 5 + energy * 10;
              activeLayers.forEach((layer, index) => {
                const level =
                  layer.prevLevel + (layer.currLevel - layer.prevLevel) * t;
                const layerRadius = baseR * (0.38 + level * 0.64);
                const layerAlpha = alpha * (0.58 - index * 0.1);
                drawStamp(p.x, p.y, layerRadius, layer.color, layerAlpha);
              });
            }
          }
        });

        // glyphs
        positioned.forEach((item) => {
          const trailSteps = 2;
          const baseScale = 0.84 + item.glyph.energy * 1.1;
          const baseAlpha = clampLocal(
            0.3 + item.glyph.energy * 0.82,
            0.22,
            0.95,
          );
          for (let i = trailSteps; i >= 1; i--) {
            const t = i / trailSteps;
            drawGlyphLocal(
              item.glyph,
              item.x -
                (item.glyph.motionVecX || 0) *
                  (item.glyph.trailLength || 22) *
                  t,
              item.y -
                (item.glyph.motionVecY || -0.2) *
                  (item.glyph.trailLength || 22) *
                  t,
              baseScale * (1 + t * 0.03),
              baseAlpha * (0.08 + (1 - t) * 0.16),
              10 + t * 6,
            );
          }
          drawGlyphLocal(item.glyph, item.x, item.y, baseScale, baseAlpha, 4);
        });

        // footer legend
        const legendY = exportHeight - 92;
        const items = [
          ["HEAD", DESIGN.colors.head],
          ["SHOULDER", DESIGN.colors.shoulder],
          ["ELBOW", DESIGN.colors.elbow],
          ["HAND", DESIGN.colors.hand],
          ["HIP", DESIGN.colors.hip],
          ["KNEE", DESIGN.colors.knee],
          ["FOOT", DESIGN.colors.foot],
        ];
        rctx.font =
          '600 14px Pretendard, "Noto Sans KR", "Noto Sans", Arial, sans-serif';
        items.forEach((item, index) => {
          const x = 100 + index * 200;
          const c = hexToRgbLocal(item[1]);
          rctx.fillStyle = `rgba(${c.r},${c.g},${c.b},0.92)`;
          rctx.beginPath();
          rctx.arc(x, legendY, 9, 0, Math.PI * 2);
          rctx.fill();
          rctx.fillStyle = "rgba(18,18,18,0.72)";
          rctx.fillText(item[0], x + 18, legendY + 5);
        });

        const link = document.createElement("a");
        link.download = `ritual_on_the_stairs_score_${Date.now()}.png`;
        link.href = exportCanvas.toDataURL("image/png");
        link.click();
      }

      function drawPlayhead() {
        const rect = getScoreRect();
        const y = height - PANEL_HEIGHT;

        // 하단 UI 바로 위에 붙는 soft fade. 더 이상 패널과 떨어져 보이지 않게 함.
        const gradient = ctx.createLinearGradient(0, y - 72, 0, y);
        gradient.addColorStop(0, "rgba(255,255,255,0)");
        gradient.addColorStop(0.42, "rgba(255,255,255,0.18)");
        gradient.addColorStop(0.72, "rgba(255,255,255,0.68)");
        gradient.addColorStop(1, "rgba(255,255,255,1)");

        ctx.save();
        ctx.fillStyle = gradient;

        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();

      }

      function drawScoreEvents(now) {
        const rect = getScoreRect();

        scoreEvents.forEach((event) => {
          const age = now - event.time;

          if (age < 0 || age > SCORE_WINDOW_SECONDS) return;

          const x = getTrackX(event.laneId, event.side, event.bodyX);
          const y = rect.bottom - (age / SCORE_WINDOW_SECONDS) * rect.height;

          const size = 7 + event.level * 24;
          const durationHeight =
            (event.duration / SCORE_WINDOW_SECONDS) * rect.height;
          const alpha = 1 - age / SCORE_WINDOW_SECONDS;

          drawEventShape(event, x, y, size, durationHeight, alpha);
        });
      }

      function drawEventShape(event, x, y, size, durationHeight, alpha) {
        const color = hexToRgb(event.color);
        const glow = event.level * 30;

        ctx.save();

        ctx.shadowColor = `rgba(${color.r},${color.g},${color.b},${
          0.16 + event.level * 0.54
        })`;
        ctx.shadowBlur = glow;

        ctx.translate(x, y);

        if (
          event.laneId !== "hip" &&
          event.laneId !== "knee" &&
          event.laneId !== "shoulder"
        ) {
          ctx.rotate(event.direction);
        }

        ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${
          0.28 + alpha * 0.72
        })`;
        ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${
          0.08 + alpha * 0.5
        })`;
        ctx.lineWidth = 2.4;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        if (event.shape === "twin") {
          drawTwin(size, color, alpha);
        } else if (event.shape === "disc") {
          drawDisc(size, event.side, color, alpha);
        } else if (event.shape === "dome") {
          drawDome(size, color, alpha);
        } else if (event.shape === "point") {
          drawPoint(size, event.side, color, alpha);
        } else if (event.shape === "arch") {
          drawArch(size, durationHeight, color, alpha);
        }

        ctx.restore();

        if (event.acceleration > 18) {
          ctx.beginPath();
          ctx.arc(x, y, size * 1.8, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${
            alpha * 0.4
          })`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }

      function drawTwin(size, color, alpha) {
        ctx.save();
        ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${
          0.2 + alpha * 0.58
        })`;
        ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${
          0.42 + alpha * 0.58
        })`;

        // 하나의 명확한 엉덩이/중심 도형. 겹친 두 원 표현 제거.
        ctx.beginPath();
        ctx.ellipse(0, 0, size * 0.95, size * 0.58, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.restore();
      }

      function drawDisc(size, side, color, alpha) {
        const r = size * 0.68;

        ctx.save();

        if (side === "L") {
          ctx.fillStyle = "rgba(0,0,0,0)";
          ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${
            0.45 + alpha * 0.55
          })`;

          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(0, 0, r * 0.42, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${
            0.22 + alpha * 0.62
          })`;
          ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${
            0.5 + alpha * 0.5
          })`;

          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawDome(size, color, alpha) {
        const w = size * 1.7;
        const h = size * 1.02;

        ctx.save();
        ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${
          0.18 + alpha * 0.54
        })`;
        ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${
          0.42 + alpha * 0.58
        })`;

        ctx.beginPath();
        ctx.moveTo(-w * 0.5, h * 0.42);
        ctx.quadraticCurveTo(0, -h * 0.92, w * 0.5, h * 0.42);
        ctx.lineTo(-w * 0.5, h * 0.42);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.restore();
      }

      function drawPoint(size, side, color, alpha) {
        const r = size * 0.88;

        ctx.save();

        if (side === "L") {
          ctx.fillStyle = "rgba(0,0,0,0)";
          ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${
            0.5 + alpha * 0.5
          })`;
        } else {
          ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${
            0.24 + alpha * 0.6
          })`;
          ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${
            0.5 + alpha * 0.5
          })`;
        }

        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(-r * 0.55, -r * 0.68);
        ctx.lineTo(-r * 0.42, r * 0.7);
        ctx.closePath();

        if (side === "R") ctx.fill();
        ctx.stroke();

        ctx.restore();
      }

      function drawArch(size, durationHeight, color, alpha) {
        const w = size * 1.6;
        const h = Math.max(size * 0.7, durationHeight * 0.18);

        ctx.save();
        ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${
          0.42 + alpha * 0.58
        })`;
        ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${
          0.1 + alpha * 0.28
        })`;

        ctx.beginPath();
        ctx.moveTo(-w * 0.5, h * 0.26);
        ctx.quadraticCurveTo(0, -h * 0.62, w * 0.5, h * 0.26);
        ctx.lineTo(w * 0.28, h * 0.26);
        ctx.quadraticCurveTo(0, -h * 0.28, -w * 0.28, h * 0.26);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.restore();
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function hexToRgb(hex) {
        const clean = hex.replace("#", "");
        const value = parseInt(clean, 16);

        return {
          r: (value >> 16) & 255,
          g: (value >> 8) & 255,
          b: value & 255,
        };
      }

      // --------------------------------
      // Resize
      // --------------------------------

      window.addEventListener("resize", () => {
        width = window.innerWidth;
        height = window.innerHeight;

        canvas.width = width;
        canvas.height = height;
        setupVideoOverlayCanvas();
      });
    </script>
  </body>
</html>
